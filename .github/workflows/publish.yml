name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v1.0.0)"
        required: true

jobs:
  update-homebrew-tap:
    name: Update Homebrew Tap
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "VERSION=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "TAG=$TAG" >> "$GITHUB_OUTPUT"

      - name: Compute tarball SHA256
        id: sha
        run: |
          TAG="${{ steps.version.outputs.TAG }}"
          URL="https://github.com/yurongcode/brew-use/archive/refs/tags/${TAG}.tar.gz"
          SHA=$(curl -fsSL "$URL" | shasum -a 256 | cut -d' ' -f1)
          echo "SHA=$SHA" >> "$GITHUB_OUTPUT"

      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: yurongcode/homebrew-brew-use
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Write updated formula
        working-directory: tap
        run: |
          mkdir -p Formula
          cat > Formula/brew-use.rb <<FORMULA
          class BrewUse < Formula
            desc "Homebrew mirror source manager - quickly switch between mirrors"
            homepage "https://github.com/yurongcode/brew-use"
            url "https://github.com/yurongcode/brew-use/archive/refs/tags/v${{ steps.version.outputs.VERSION }}.tar.gz"
            sha256 "${{ steps.sha.outputs.SHA }}"
            license "MIT"
            head "https://github.com/yurongcode/brew-use.git", branch: "main"

            def install
              bin.install "bin/brew-use"
            end

            def caveats
              <<~EOS
                Add the following line to your shell profile (~/.zshrc or ~/.bashrc):
                  eval \"$(brew-use init)\"
              EOS
            end

            test do
              assert_match "brew-use", shell_output("\#{bin}/brew-use --version")
            end
          end
          FORMULA

      - name: Commit and push formula
        working-directory: tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/brew-use.rb
          git diff --cached --quiet || git commit -m "brew-use v${{ steps.version.outputs.VERSION }}"
          git push
